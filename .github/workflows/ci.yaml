name: CI

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/api-gateway

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout app code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Checkout config repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/gitops-config
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
          path: gitops-config

      - name: Update image tag in config repo
        run: |
          cd gitops-config
          IMAGE_TAG="${{ env.IMAGE }}:${{ github.sha }}"
          sed -i "s|image: ghcr.io/.*/api-gateway:.*|image: ${IMAGE_TAG}|" apps/api-gateway/base/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy: api-gateway ${{ github.sha }}"
            git push
          fi